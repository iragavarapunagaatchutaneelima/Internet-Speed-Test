<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrbitSpeed — Internet Speed Test</title>
  <meta name="description" content="Real-time internet speed test powered by Python Flask. Measure your download speed, upload speed, and ping latency instantly."/>
  <meta name="theme-color" content="#060b18"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="app" id="app">

  <!-- Background layers -->
  <div class="bg-canvas" aria-hidden="true"></div>
  <div class="bg-grid"   aria-hidden="true"></div>

  <!-- ══ Navbar ══════════════════════════════════════════════════════════ -->
  <header class="navbar" role="banner">
    <div class="navbar__inner">
      <div class="navbar__brand">
        <div class="navbar__logo" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="url(#nb-g)" stroke-width="2"/>
            <path d="M12 2 A10 10 0 0 1 22 12" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="3" fill="#00d4ff"/>
            <defs>
              <linearGradient id="nb-g" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="navbar__title">OrbitSpeed</span>
      </div>
      <div class="navbar__right-links">
        <a
          href="https://github.com/iragavarapunagaatchutaneelima"
          target="_blank"
          rel="noopener noreferrer"
          class="navbar__github-link"
          aria-label="GitHub Profile"
        >
          <svg
            viewBox="0 0 24 24"
            width="20"
            height="20"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="navbar__github-icon"
          >
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
            <path d="M9 18c-4.51 2-5-2-7-2" />
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- ══ Main content ════════════════════════════════════════════════════ -->
  <main class="main" role="main" id="main-content">

    <!-- ── Hero card ──────────────────────────────────────────────────── -->
    <section class="hero-card" aria-label="Speed meter">
      <div class="hero-card__shimmer" aria-hidden="true"></div>

      <!-- SVG Gauge — viewBox matches gauge.js geometry: 440×280, cx=220, cy=240, R=160 -->
      <div class="gauge-outer" role="img" aria-label="Speed gauge">
        <svg id="gauge-svg" viewBox="0 0 440 280" class="gauge-svg" aria-hidden="true" overflow="visible">
          <defs>
            <linearGradient id="g-grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#00d4ff"/>
              <stop offset="55%"  stop-color="#818cf8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
            <filter id="g-glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="n-glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <radialGradient id="g-ambient" cx="50%" cy="50%" r="50%">
              <stop id="ambient-stop" offset="0%"   stop-color="#3d4f7c" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#3d4f7c" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- Ambient glow -->
          <ellipse cx="220" cy="240" rx="200" ry="200" fill="url(#g-ambient)"/>

          <!-- Track arc (cx=220, cy=240, R=160) — left(60,240) → right(380,240) -->
          <path d="M60,240 A160,160 0 1 1 380,240" fill="none"
            stroke="rgba(255,255,255,0.07)" stroke-width="18" stroke-linecap="round"/>

          <!-- Filled arc — stroke-dasharray = π*160 ≈ 502.65 -->
          <path id="gauge-fill" d="M60,240 A160,160 0 1 1 380,240" fill="none"
            stroke="url(#g-grad)" stroke-width="18" stroke-linecap="round"
            stroke-dasharray="502.65" stroke-dashoffset="502.65"
            filter="url(#g-glow)"
            style="transition: stroke-dashoffset 0.15s cubic-bezier(0.4,0,0.2,1)"/>

          <!-- Tick marks (rendered dynamically by gauge.js) -->
          <g id="gauge-ticks"></g>

          <!-- Needle group (hidden while IDLE) -->
          <g id="needle-group" style="display:none">
            <line id="needle-line" x1="220" y1="240" x2="220" y2="90"
              stroke="#3d4f7c" stroke-width="3" stroke-linecap="round"
              filter="url(#n-glow)"
              style="transition: x2 0.12s ease, y2 0.12s ease, stroke 0.25s ease"/>
            <circle cx="220" cy="240" r="14"
              fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <circle id="needle-hub" cx="220" cy="240" r="7"
              fill="#3d4f7c" filter="url(#n-glow)"
              style="transition: fill 0.25s ease"/>
          </g>

          <!-- Idle hub (shown while IDLE) -->
          <circle id="idle-hub" cx="220" cy="240" r="10"
            fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

          <!-- Speed value — sized down so it never overlaps the arc -->
          <text id="gauge-value" x="220" y="175" text-anchor="middle"
            font-size="44" font-weight="800"
            font-family="'JetBrains Mono',monospace"
            fill="white" letter-spacing="-1">0.00</text>

          <!-- Unit label -->
          <text id="gauge-unit" x="220" y="204" text-anchor="middle"
            font-size="13" font-weight="700"
            font-family="'Inter',sans-serif"
            fill="#3d4f7c"
            style="transition: fill 0.25s ease">Mbps</text>

          <!-- Phase label -->
          <text id="gauge-phase" x="220" y="222" text-anchor="middle"
            font-size="8" font-weight="600" letter-spacing="3"
            font-family="'Inter',sans-serif"
            fill="rgba(255,255,255,0.25)">READY</text>
        </svg>
      </div>

      <!-- ISP strip (below gauge) -->
      <div id="isp-strip" class="isp-strip" style="display:none">
        <img id="isp-flag" class="isp-strip__flag" width="22" height="16" alt="" style="display:none"/>
        <span id="isp-name" class="isp-strip__isp"></span>
        <span id="isp-dot"  class="isp-strip__sep" style="display:none">·</span>
        <span id="isp-loc"  class="isp-strip__loc" style="display:none"></span>
      </div>

      <!-- Unit toggle -->
      <div class="unit-toggle" role="group" aria-label="Speed unit">
        <button class="unit-btn unit-btn--active" data-unit="mbps" id="unit-mbps">Mbps</button>
        <button class="unit-btn" data-unit="mbs"  id="unit-mbs">MB/s</button>
        <button class="unit-btn" data-unit="kbs"  id="unit-kbs">KB/s</button>
      </div>

      <!-- Start / Stop / Retest button -->
      <div class="btn-wrap">
        <button id="test-btn" class="test-btn test-btn--start" aria-label="Start speed test">
          <span class="test-btn__ring" aria-hidden="true"></span>
          <span id="test-btn-label" class="test-btn__label">Start Test</span>
        </button>
      </div>

      <!-- Error notice -->
      <div id="error-notice" class="error-notice" role="alert" style="display:none"></div>
    </section>

    <!-- ── Stats grid ─────────────────────────────────────────────────── -->
    <section class="stats-section" aria-label="Test results">
      <div class="stats-grid">

        <!-- Ping -->
        <div class="stat-card" id="card-ping">
          <div class="stat-card__icon-wrap">
            <svg class="stat-card__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div class="stat-card__body">
            <div class="stat-card__label">Ping</div>
            <div class="stat-card__value-row">
              <span class="stat-card__value" id="stat-ping">—</span>
              <span class="stat-card__unit">ms</span>
            </div>
            <div class="stat-card__sublabel" id="ping-sublabel"></div>
          </div>
          <div class="stat-card__loader" id="ping-loader" style="display:none"></div>
        </div>

        <!-- Download -->
        <div class="stat-card stat-card--dl" id="card-dl" tabindex="0"
          role="button" aria-label="Download — click to show on gauge">
          <div class="stat-card__icon-wrap stat-card__icon-wrap--dl">
            <svg class="stat-card__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div class="stat-card__body">
            <div class="stat-card__label">Download</div>
            <div class="stat-card__value-row">
              <span class="stat-card__value" id="stat-dl">—</span>
              <span class="stat-card__unit" id="unit-dl-label">Mbps</span>
            </div>
            <div class="stat-card__sublabel" id="dl-sublabel">—</div>
          </div>
          <div class="stat-card__loader stat-card__loader--dl" id="dl-loader" style="display:none"></div>
        </div>

        <!-- Upload -->
        <div class="stat-card stat-card--ul" id="card-ul" tabindex="0"
          role="button" aria-label="Upload — click to show on gauge">
          <div class="stat-card__icon-wrap stat-card__icon-wrap--ul">
            <svg class="stat-card__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="stat-card__body">
            <div class="stat-card__label">Upload</div>
            <div class="stat-card__value-row">
              <span class="stat-card__value" id="stat-ul">—</span>
              <span class="stat-card__unit" id="unit-ul-label">Mbps</span>
            </div>
            <div class="stat-card__sublabel" id="ul-sublabel">—</div>
          </div>
          <div class="stat-card__loader stat-card__loader--ul" id="ul-loader" style="display:none"></div>
        </div>

        <!-- Quality grade (hidden until DONE, populated via /api/quality) -->
        <div class="stat-card stat-card--quality" id="quality-wrap" style="display:none">
          <div class="quality-score">
            <div class="quality-score__ring" style="--ring-color:#10b981">
              <span class="quality-score__grade" style="color:#10b981">—</span>
            </div>
            <div class="quality-score__text">
              <div class="quality-score__label">—</div>
              <div class="quality-score__sub">Connection Quality</div>
            </div>
          </div>
        </div>

      </div><!-- /.stats-grid -->

      <!-- ISP detail card (shown after DONE) -->
      <div id="isp-card" class="isp-card" style="display:none">
        <svg class="isp-card__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
        <div>
          <div class="isp-card__name"   id="isp-card-name"></div>
          <div class="isp-card__detail" id="isp-card-detail"></div>
        </div>
      </div>
    </section>

    <!-- ── Streaming platform support (data from /api/streaming) ─────── -->
    <section id="streaming-section" class="streaming-section" style="display:none"
      aria-label="Streaming quality">
      <div class="streaming-header">
        <div class="streaming-title">
          <span class="streaming-title-dot" aria-hidden="true"></span>
          Streaming Platform Support
        </div>
        <div class="streaming-subtitle">Estimated quality based on your download speed</div>
      </div>
      <div class="streaming-cards" id="streaming-cards"></div>
    </section>

    <!-- ── History panel (React Component Mount Point) ────── -->
    <div id="react-history-root"></div>

  </main>

  <!-- ══ Footer ══════════════════════════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand">OrbitSpeed</div>
      <div class="footer__credit">
        Developed by <strong>Neelima</strong>
        <span class="footer__dot">·</span>
        Powered by Python Flask &amp; SQLite
      </div>
      <div class="footer__tech">
        ⚡ Python · Flask · SQLite · Vanilla JS · CSS
        <span class="footer__dot">·</span>
        {{ year }}
      </div>
    </div>
  </footer>

</div><!-- /#app -->

<!-- React & Babel for lightweight UI integration -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<!-- Script load order matters: gauge → speedtest → main → React -->
<script src="/static/js/gauge.js"></script>
<script src="/static/js/speedtest.js"></script>
<script src="/static/js/main.js"></script>
<script type="text/babel" src="/static/js/ReactHistoryPanel.jsx"></script>
</body>
</html>
