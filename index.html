<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>OrbitSpeed — Internet Speed Test</title>
    <meta name="description" content="Test your internet speed with OrbitSpeed. Measure download, upload, and ping with real-time results powered by Cloudflare Edge." />
    <meta name="keywords" content="internet speed test, bandwidth test, ping test, download speed, upload speed" />
    <meta name="author" content="OrbitSpeed" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="OrbitSpeed — Internet Speed Test" />
    <meta property="og:description" content="Measure your real internet speed. Download, Upload, Ping — powered by Cloudflare Edge." />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#060B18" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OrbitSpeed" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data: https://flagcdn.com;
               connect-src 'self' https://speed.cloudflare.com https://ipapi.co https://httpbin.org;
               object-src 'none';
               base-uri 'self';
               frame-ancestors 'none';
               form-action 'self';" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
